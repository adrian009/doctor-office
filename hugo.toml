  #Contact
  [params.contact]
    enable = true
    title = "Contactează-ne"
    content = """
    Ne găsiți la adresa: Pitești, Cartier Eremia Grigorescu, Str. Trandafirilor, Bl. P2.
    Pentru programări:
        Telefon: 0730 388 176 
        Luni - Vineri: 09:00 - 15:00 
    """


  # List pages like blogs and posts
  [params.listPages]
    disableFeaturedImage = false

  # Single pages like blog and post
  [params.singlePages]
    socialShare = true

    [params.singlePages.readTime]
      enable = true
      content = "min read"

    [params.singlePages.scrollprogress]
      enable = true

    [params.singlePages.tags]
      openInNewTab = true

  # For translations
  [params.terms]
    read = "Read"
    toc = "Table Of Contents"
    copyright = "All rights reserved"
    emailText = "Check out this site"

  [params.datesFormat]
    article = "Jan 2, 2006"
    articleList = "Jan 2, 2006"
    articleRecent = "Jan 2, 2006"

  #customScripts = """ # You can add custom scripts which will be added before </body> tag
  #  <script type="text/javascript"><!-- any script here --></script>
  #"""