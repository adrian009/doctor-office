baseURL = 'https://www.cabinet-dr-bancescu.ro/'
languageCode = 'en-us'
title = 'Avancris - Întelegem Mintea, Susținem Omul'
theme = 'hugo-profile'

[params]
  title = "Avancris"
  description = "Avancris - Întelegem Mintea, Susținem Omul"
  # staticPath = ""  # The path to serve the static files from
  # favicon = "/doctor-office/"
  # Whether the fade animations on the home page will be enabled
  animate = true

[markup.goldmark.renderer]
  unsafe = true

  [params.font]
    fontSize = "1rem" # default: 1rem
    fontWeight = 400 # default: 400
    lineHeight = 1.5 # default: 1.5
    textAlign = "left" # default: left

  # If you want to customize the menu, you can change it here
  [params.navbar]
    align = "ms-auto" # Left: ms-auto | center: mx-auto | right: me-auto | Default: ms-auto
    brandLogo = "./fav.png" # Logo for the brand | default is the favicon variable
    showBrandLogo = true # Show brand logo in nav bar | default is true
    brandName = "Avancris" # Brand name for the brand | default is the title variable
    disableSearch = true
    # searchPlaceholder = "Search"
    enableSeparator = false

    [params.navbar.stickyNavBar]
      enable = true
      showOnScrollUp = true

    [params.navbar.menus]
      disableAbout = false
      disableExperience = false
      disableEducation = false
      disableProjects = false
      disableAchievements = false
      disableContact = false

  # Hero
  [params.hero]
    enable = true
    intro = "Bine ați venit la"
    title = "AVANCRIS"
    subtitle = "Empatie - Echilibru - Evoluție"
    content = "La S.C. AVANCRIS S.R.L. oferim servicii medicale specializate dedicate evaluării pacienților, diagnosticării acestora și tratamentului tulburărilor psihice, într-un cadru sigur, discret și empatic."
    image = "./logo.jpeg"

    [params.hero.bottomImage]
      enable = true
      roundImage = false # Make hero image circular | default false

    [params.hero.button]
      enable = false
      name = "Resume"
      url = "#"
      download = true
      newPage = false


# About
  [params.about]
    enable = true
    title = "Echipa noastră"
    image = "./avancris-team.png"
    content = """
Echipa noastră, formată din medic, psiholog, asistent medical oferă o abordare integrată a sănătății mintale, cu accent pe respect și echilibrarea psihică a pacientului.
"""
    [params.about.skills]
      enable = false
      title = "Servicii oferite:"
      items = [
        
      ]

  # About
  [params.about2]
    enable = true
    title = "Dr. Băncescu Răzvan-Alexandru - Parcurs de excepție"
    image = "./hero.jpeg"
    content = """
La începutul anilor ‘90, în cadrul Colegiul Național I.C. Brătianu Pitești, continuat cu Universitatea de Medicină și Farmacie ”Tg. Mureș” și ulterior rezidențiatul efectuat într-un cadru totalmente profesionist la Spitalul Clinic de Urgență Militar Central ,,Carol Davila’’ –  Bucuresti, sub îndrumarea Conf. univ. dr. col. Vasiliu Octavian.


Continuă ulterior cu o experiență de peste 16 ani în Spitalul Județean de Urgență Pitești, Sectia Psihiatrie (în perioada martie 2024 - decembrie 2025 Medic Șef  Secție), în paralel în perioada 2015-2026 membru al Comisiei Medico-Legale Psihiatrice în cadrul Serviciului de Medicină Legală Argeș.
"""
    [params.about2.skills]
      enable = true
      title = "Servicii oferite:"
      items = [
        "Consultații (inclusiv la domiciliu) cu diagnosticare",
        "Eliberare de rețete simple/compensate, scrisori medicale, scheme de tratament, bilete de trimitere",
        "Evaluări psihiatrice complexe",
        "Eliberare de referate medicale(necesare la CECM, DGASPC – Handicap)",
        "Completare program recuperator",
        "Eliberare de adeverințe medicale",
        "Eliberare raport de evaluare psihiatrică pentru instanța(tutela)"
      ]

  # Second About Section (Custom Added)
  [params.about3]
    enable = true
    title = "Psiholog - Lungan Cristina Elena"
    image = "./logo.jpeg"
    content = """
Cu o experiență de peste 10 ani în domeniul psihologiei și psiho-pedagogiei, oferă suport specializat în evaluarea și consilierea pacienților, contribuind la menținerea și îmbunătățirea echilibrului emoțional.
"""
    [params.about3.skills]
      enable = true
      title = "Servicii oferite:"
      items = [
        "Testări clinice(PANSS, YMRS, HAM-D, HAM-A, MMSE, TEST CEAS, GAFS, etc.) cu rapoarte de evaluare psihologică",
        "Consiliere psihologică",
        "Terapii (de suport imediat, cognitiv-comportamentală, psihodinamică/psihanalitică, centrată pe persoană, de cuplu și familie, prin expunere)",
        "Eliberare avize psihologice (psihologie clinică, psihologia muncii, psihologia transporturilor)",
        "Eliberare raport de evaluare psihologică pentru instanță (tutelă)"
      ]


  # Third About Section (Custom Added)
  [params.about4]
    enable = true
    title = "Asistent medical - Catrina Maria Denisa"
    image = "./logo.jpeg"
    content = """
Cu  experiență de peste 12 ani în domeniul psihiatriei de ambulatoriu și al îngrijirii medico-psihiatrice, asigură suport medical și contribuie la monitorizarea și îngrijirea pacienților.
"""
    [params.about4.skills]
      enable = false
      title = "Competențe:"
      items = [
        "Specialitate 1",
        "Specialitate 2"
      ]


